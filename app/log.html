<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogIn | LogUp</title>
</head>
<body>
  <div class="column">
      <form action="" method="post" class="visible" id="login">
          <h2>LogIn</h2>
          <div class="row">
              <label>Username:</label>
              <input type="text" class="username" placeholder="Username" required>
          </div>
          <div class="row">
              <label>password:</label>
              <input type="password" minlength="6" class="password" placeholder="Password" required>
          </div>
          <input type="submit" id="loginBtn" value="Login">
      </form>
      <form method="post" class="hidden" id="logup">
          <h2>LogUp</h2>
          <div class="row">
              <label>Username:</label>
              <input type="text" class="username" placeholder="Username" required>
          </div>
          <div class="row">
              <label>password:</label>
              <input type="password" minlength="6" class="password" placeholder="Password" required>
          </div>
          <input type="submit" id="logupBtn" value="Logup">
      </form>
  </div>
  <button id="switch" onclick="switchForm()">Switch</button>
  <script src="log.js"></script>
</body>
</html>
